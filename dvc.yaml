stages:
  prepare:
    cmd: python src/data/load_data.py
    deps:
      - src/data/load_data.py
      - data/raw/adult.data
      - data/raw/adult.test
      - configs/params.yaml
    outs:
      - data/processed/train.csv
      - data/processed/test.csv
    params:
      - configs/params.yaml:
          - data.columns
          - data.target_column

  preprocess:
    cmd: python src/features/feature_engineering.py
    deps:
      - src/features/feature_engineering.py
      - src/features/transformers.py
      - data/processed/train.csv
      - data/processed/test.csv
      - configs/params.yaml
    outs:
      - data/processed/pipeline.pkl
      - data/splits/X_train.csv
      - data/splits/X_test.csv
      - data/splits/y_train.csv
      - data/splits/y_test.csv
      - data/splits/reference.csv
      - data/splits/production.csv
    params:
      - configs/params.yaml:
          - preprocessing.numeric_features
          - preprocessing.categorical_features
          - preprocessing.pipeline_path
          - preprocessing.random_state

  train:
    cmd: python src/training/train.py
    deps:
      - src/training/train.py
      - data/splits/X_train.csv
      - data/splits/X_test.csv
      - data/splits/y_train.csv
      - data/splits/y_test.csv
      - configs/params.yaml
    outs:
      - models/best_model.pkl
    params:
      - configs/params.yaml:
          - training.experiment_name
          - training.hpo_n_iter
          - training.hpo_cv
          - training.metric
          - training.calibration_size
          - training.threshold_candidates
          - training.models
