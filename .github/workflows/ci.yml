name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------ #
  # Stage 1: Lint
  # ------------------------------------------------------------------ #
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 src/ tests/ monitoring/ \
            --max-line-length=120 \
            --exclude=__pycache__,*.pyc \
            --ignore=E501,W503,E402,W391

  # ------------------------------------------------------------------ #
  # Stage 2: Unit Tests (coverage >= 70%)
  # ------------------------------------------------------------------ #
  unit-tests:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ tests/data/ \
            --cov=src.features.transformers \
            --cov=src.data.validate_data \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v

  # ------------------------------------------------------------------ #
  # Stage 3: Data Validation (Pandera schema check)
  # ------------------------------------------------------------------ #
  data-validation:
    name: Data Validation (Pandera)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run schema validation on sample data
        run: |
          python - <<'EOF'
          import sys, os
          sys.path.insert(0, ".")
          import pandas as pd
          from src.data.validate_data import validate_data

          # Inline sample — no raw data file needed in CI
          df = pd.DataFrame({
              "age": [39, 50, 38],
              "workclass": ["State-gov", "Private", "Private"],
              "fnlwgt": [77516, 83311, 215646],
              "education": ["Bachelors", "Bachelors", "HS-grad"],
              "education-num": [13, 13, 9],
              "marital-status": ["Never-married", "Married-civ-spouse", "Divorced"],
              "occupation": ["Adm-clerical", "Exec-managerial", "Handlers-cleaners"],
              "relationship": ["Not-in-family", "Husband", "Not-in-family"],
              "race": ["White", "White", "White"],
              "sex": ["Male", "Male", "Male"],
              "capital-gain": [2174, 0, 0],
              "capital-loss": [0, 0, 0],
              "hours-per-week": [40, 13, 40],
              "native-country": ["United-States", "United-States", "United-States"],
              "income": ["<=50K", "<=50K", "<=50K"],
          })
          ok = validate_data(df)
          sys.exit(0 if ok else 1)
          EOF

  # ------------------------------------------------------------------ #
  # Stage 4: Train model and publish artifacts for downstream validation
  # ------------------------------------------------------------------ #
  train:
    name: Train Model
    runs-on: ubuntu-latest
    needs: data-validation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download Adult Income dataset
        run: |
          mkdir -p data/raw
          wget -O data/raw/adult.data \
            https://archive.ics.uci.edu/ml/machine-learning-databases/adult/adult.data
          wget -O data/raw/adult.test \
            https://archive.ics.uci.edu/ml/machine-learning-databases/adult/adult.test

      - name: Start local MLflow server
        run: |
          mlflow server \
            --backend-store-uri sqlite:///mlflow.db \
            --default-artifact-root ./mlruns \
            --host 127.0.0.1 \
            --port 5000 &
          sleep 10

      - name: Configure local DVC remote
        run: |
          mkdir -p /tmp/dvc-remote
          if [ ! -d .dvc ]; then
            dvc init --no-scm
          fi
          dvc remote add -d localremote /tmp/dvc-remote

      - name: Run DVC pipeline
        run: dvc repro

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            models/
            data/splits/
            data/processed/pipeline.pkl

  # ------------------------------------------------------------------ #
  # Stage 5: Model Validation (F1 >= threshold)
  # ------------------------------------------------------------------ #
  model-validation:
    name: Model Validation
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: .

      - name: Run model validation
        run: python src/evaluation/evaluate.py
